# 基础配置
app:
  port: 7000
  version: v0.1.0

# 数据库配置
database:
  driver: mysql
  source: root:123456@tcp(127.0.0.1:3306)/echo-framework?charset=utf8mb4&parseTime=True&loc=Local
  sync: true    # 自动同步数据库 (首次运行建议开启)
  max_idle_conns: 5    # 最大空闲连接数
  max_open_conns: 20    # 最大打开连接数

# 日志配置
log:
  level: debug    # 日志级别 (debug、info、warn、error)
  format: json    # 日志格式 (text、json)
  output_method: console    # 日志输出方式 (console、file、default)
  output_dir: logs    # 日志输出目录
  max_size: 10    # 日志文件最大大小 (MB)
  max_backups: 15    # 日志文件最大备份数
  max_age: 30    # 日志文件最大保存天数

# jwt配置
jwt:
  issuer: echo-framework    # 签发者
  signing_method: HS256    # 签名算法 (HS256、HS384、HS512)
  expiration_time: 30m    # 过期时间 (单位 min)

# 监控配置
monitor:
  enable: true    # 是否开启运行时监控
  path: /debug/statsviz    # 监控页面访问地址
