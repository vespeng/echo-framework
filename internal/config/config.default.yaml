# 基础配置
app:
  port: 8000
  version: v1.0.0

# 数据库配置
database:
  driver: mysql
  source: root:123456@tcp(127.0.0.1:3306)/echo-framework?charset=utf8mb4&parseTime=True&loc=Local
  sync: false    # 生产环境建议关闭自动同步，避免意外变更表结构
  max_idle_conns: 10    # 最大空闲连接数
  max_open_conns: 100    # 最大打开连接数

# 日志配置
log:
  level: info    # 日志级别 (debug、info、warn、error)
  format: json    # 日志格式 (text、json)
  output_method: default    # 日志输出方式 (console、file、default)
  output_dir: logs    # 日志输出目录
  max_size: 100    # 日志文件最大大小 (MB)
  max_backups: 30    # 日志文件最大备份数
  max_age: 30    # 日志文件最大保存天数

# jwt配置
jwt:
  issuer: echo-framework    # 签发者
  signing_method: HS256    # 签名算法 (HS256、HS384、HS512)
  expiration_time: 24h    # 过期时间 (可用 30m、1h、24h)

# 监控配置
monitor:
  enable: false    # 生产环境建议关闭运行时监控地址
  path: /debug/statsviz    # 监控页面访问地址
